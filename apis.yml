apis:
- aid: port-community-systems:portbase-api
  name: Portbase Port Community System API
  tags:
  - Maritime
  - Port
  - Customs
  - Cargo
  - Netherlands
  - REST
  image: https://raw.githubusercontent.com/api-evangelist/port-community-systems/refs/heads/main/image.png
  humanURL: https://www.portbase.com/en/
  baseURL: https://api.portbase.com
  properties:
  - url: https://www.portbase.com/en/
    type: Documentation
  - url: openapi/portbase-port-community-openapi.yml
    type: OpenAPI
  - url: asyncapi/portbase-vessel-events-asyncapi.yml
    type: AsyncAPI
  description: >-
    Portbase is the Dutch Port Community System providing APIs for customs declarations, cargo manifests, vessel call notifications, berth planning, and port logistics coordination at the Port of Rotterdam and Amsterdam, connecting shipping lines, freight forwarders, customs authorities, and terminal operators.

- aid: port-community-systems:ipcsa-port-community-api
  name: IPCSA Port Community Systems API
  tags:
  - Maritime
  - Port
  - Customs
  - EDIFACT
  - Cargo
  - International
  image: https://raw.githubusercontent.com/api-evangelist/port-community-systems/refs/heads/main/image.png
  humanURL: https://www.ipcsa.international/
  baseURL: https://api.portcommunity.example.com
  properties:
  - url: https://www.ipcsa.international/
    type: Documentation
  description: >-
    The International Port Community Systems Association (IPCSA) represents Port Community System operators and Maritime Single Window operators worldwide. Member PCS platforms provide APIs for customs declarations, cargo manifests, vessel call data, and port logistics coordination using REST and EDIFACT protocols.

